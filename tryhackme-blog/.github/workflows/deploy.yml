name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: './tryhackme-blog/package-lock.json' # 👈 Points to sub-folder

      - name: Install dependencies
        run: npm ci
        working-directory: ./tryhackme-blog # 👈 Runs inside sub-folder

      - name: Build
        run: npm run build
        working-directory: ./tryhackme-blog # 👈 Runs inside sub-folder

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './tryhackme-blog/dist' # 👈 Finds built files in sub-folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4